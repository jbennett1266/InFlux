services:
  spacetimedb:
    image: clockworklabs/spacetime:latest
    command: ["start", "--listen-addr", "0.0.0.0:3000"]
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb-data:/var/lib/spacetimedb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - spacetimedb

volumes:
  spacetimedb-data:
