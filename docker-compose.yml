version: '3.8'

services:
  spacetimedb:
    image: clockworklabs/spacetimedb:latest
    ports:
      - "3000:3000"
    volumes:
      - spacetimedb-data:/var/lib/spacetimedb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    depends_on:
      - spacetimedb

volumes:
  spacetimedb-data:
